<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Future Reservation System - Premium UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root { 
            --primary-gold: #c5a059;
            --dark-deep: #0f172a;
            --luxury-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --gradient-gold: linear-gradient(135deg, #c5a059 0%, #ecd08d 100%);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --error-red: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Cairo', sans-serif;
            background: #f8fafc; direction: rtl;
        }

        body { display: flex; justify-content: center; align-items: center; }

        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-image: url("https://i.ibb.co/1GbPSfyw/Bannar-2-LOGO.png");
            background-position: center; background-size: contain; background-repeat: no-repeat;
            transition: opacity 1s ease;
        }

        #splash::after {
            content: "Future reservation system © 2026";
            position: absolute; bottom: 30px; color: var(--primary-gold);
            font-size: 0.7rem; font-weight: 700; opacity: 0.8;
        }

        .app {
            width: 100%; max-width: 390px; height: 100dvh; 
            display: flex; flex-direction: column; background: #ffffff;
            position: relative; opacity: 0; transition: opacity 1s ease;
            overflow: hidden;
        }

        .lang-btn {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px;
            padding: 4px 12px; color: white; font-size: 0.7rem; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }

        .header-slider { width: 100%; height: 210px; position: relative; flex-shrink: 0; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }
        .banner-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; width: 85%; z-index: 10;
        }
        .banner-text h1 { font-size: 1.2rem; font-weight: 800; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .main-content { 
            flex: 1; padding: 15px; display: flex; flex-direction: column; 
            gap: 12px; background: linear-gradient(to bottom, #ffffff, #f1f5f9);
            overflow: hidden;
        }

        .card {
            background: white; border-radius: 18px; padding: 15px;
            box-shadow: var(--luxury-shadow); border: 1px solid rgba(0,0,0,0.02);
            animation: cardFadeIn 0.6s ease both;
            width: 95%; margin: 0 auto;
        }

        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card h3, .card h4 { margin-top: 0; font-size: 0.95rem; color: var(--dark-deep); display: flex; align-items: center; justify-content: center; gap: 8px; }

        .btn {
            width: 100%; padding: 11px; border-radius: 12px; border: none;
            font-family: 'Cairo'; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; transition: var(--transition-smooth);
            background: var(--dark-deep); color: white;
            margin: 6px 0; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none;
        }
        .btn:active { transform: scale(0.96); }
        .btn-gold { background: var(--gradient-gold); color: var(--dark-deep); }
        .btn-whatsapp { background: #25d366; color: white; }

        .booking-form input {
            width: 100%; padding: 10px; border-radius: 10px;
            border: 1.5px solid #e2e8f0; margin-bottom: 6px;
            font-family: 'Cairo'; font-size: 0.8rem;
        }

        .details-box {
            background: #fcfcfc; border: 1px dashed var(--primary-gold);
            border-radius: 12px; padding: 12px; margin: 10px 0; text-align: right;
        }
        .detail-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; }
        .detail-label { color: #64748b; }
        .detail-value { color: var(--dark-deep); font-weight: 700; }

        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            background: rgba(197, 160, 89, 0.1); color: var(--primary-gold);
            font-size: 0.7rem; font-weight: 800; margin-bottom: 8px;
        }

        .hint-error { color: var(--error-red); font-size: 0.75rem; font-weight: 700; display: none; margin-bottom: 8px; }

        .social-nav {
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px 10px; background: #fff; border-top: 1px solid #f1f5f9; flex-shrink: 0;
        }
        .social-item img { width: 26px; height: 26px; transition: 0.3s; }
        .whatsapp-main {
            background: #25d366; padding: 10px; border-radius: 50%;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); transform: translateY(-10px);
        }
        .whatsapp-main img { width: 26px; height: 26px; filter: brightness(0) invert(1); }

        .brand-footer {
            text-align: center; padding: 5px 0 10px 0; background: #fff;
            font-size: 0.75rem; font-weight: 800;
            background: var(--gradient-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .en-mode { direction: ltr !important; }
        .en-mode .details-box { text-align: left !important; }
    </style>
</head>

<body>

<div id="splash"></div>

<div class="app" id="mainApp">
    <div class="lang-btn" id="langBtn" onclick="toggleLanguage()">EN</div>
    
    <div class="header-slider swiper">
        <div class="swiper-wrapper" id="banner-wrapper">
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=600"><div class="banner-text"><h1 id="txt-b1">نظام الحجز الذكي المستقبلي</h1></div></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1497366811353-6870744d04b2?q=80&w=600"><div class="banner-text"><h1 id="txt-b2">أناقة التصميم وسهولة الاستخدام</h1></div></div>
            <div class="swiper-slide"><img src="https://i.ibb.co/kgm39Svk/Bannar-2-LOG3.png"><div class="banner-text"><h1 id="txt-b3">إدارة احترافية متكاملة</h1></div></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div id="contentArea" class="main-content"></div>

    <div class="social-nav">
        <a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
        <a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
        <a href="https://wa.me/201122750229" class="social-item whatsapp-main"><img src="https://i.ibb.co/21NBtNqn/Pngtree-whatsapp-icon-logo-whatsapp-icon-3560535.png"></a>
        <a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828960.png"></a>
        <a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
    </div>

    <div class="brand-footer">Future reservation system © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUuCywYw66rpY7nChKRKrgD1C24t8U70H7wRxtp9va6eM3ycvlpo3MYQnU0Z_qkLeC/exec";
const contentArea = document.getElementById('contentArea');
let CLIENT_NAME = "", CLIENT_EMAIL = "";
let currentLang = 'ar';

const i18n = {
    ar: {
        b1: "نظام الحجز الذكي المستقبلي", b2: "أناقة التصميم وسهولة الاستخدام", b3: "إدارة احترافية متكاملة",
        choose: "اختر الخدمة", demo: "تجربة النسخة التجريبية", buy: "شراء النسخة الكاملة",
        setup: "إعداد التجربة", bizName: "اسم النشاط التجاري", bizEmail: "بريدك الإلكتروني",
        enter: "دخول النظام", back: "رجوع",
        formTitle: "نموذج الحجز", namePl: "الاسم ثلاثي", phonePl: "رقم الهاتف", confirm: "تأكيد الحجز",
        nameErr: "⚠️ يجب كتابة الاسم ثلاثي", phoneErr: "⚠️ من فضلك أدخل 11 رقم", emailErr: "⚠️ يرجى إدخال إيميل صحيح يحتوي على @",
        fridayErr: "⚠️ عذراً، الجمعة إجازة رسمية",
        processing: "جاري تأكيد بيانات الحجز.. يرجى الانتظار",
        dupTitle: "حجز قائم بالفعل", dupMsg: "نحيطكم علماً بأن سجلاتنا تشير إلى وجود طلب حجز مسبق مسجل بهذا الرقم. يرجى مراجعة الإيصال السابق أو التواصل مع الدعم.",
        adminBadge: "تنبيه إداري",
        successTitle: "تم تأكيد الطلب", successHero: "شكراً لثقتكم، إليكم تفاصيل الإيصال الرقمي:",
        receiptId: "رقم الإيصال:", bookingDate: "تاريخ الحجز:", regTime: "وقت التسجيل:", status: "الحالة:", approved: "معتمد",
        emailNotice: "يرجى مراجعة بريدك الإلكتروني للاطلاع على تفاصيل الحجز المرسلة إليكم.",
        home: "العودة للرئيسية", nameBuy: "الاسم الثلاثي", phoneBuy: "رقم الهاتف (11 رقم)", send: "إرسال الطلب",
        buySuccessTitle: "تهانينا! تم اشتراكك", 
        buySuccessMsg: "شكراً لاختيارك Future System. لقد استلمنا طلبك وستقوم خدمة العملاء بالتواصل معك في أقرب وقت ممكن لتفعيل النسخة الكاملة.",
        buyDupMsg: "عذراً، هذا الرقم مسجل لدينا بالفعل في طلبات الشراء. من فضلك تواصل مع خدمة العملاء للمتابعة.",
        contactSupport: "تواصل مع خدمة العملاء"
    },
    en: {
        b1: "Future Smart Booking System", b2: "Elegant Design & Ease of Use", b3: "Integrated Professional Management",
        choose: "Choose Service", demo: "Try Demo Version", buy: "Buy Full Version",
        setup: "Setup Experience", bizName: "Business Name", bizEmail: "Your Email",
        enter: "Enter System", back: "Back",
        formTitle: "Booking Form", namePl: "Full Name", phonePl: "Phone Number", confirm: "Confirm Booking",
        nameErr: "⚠️ Full name is required", phoneErr: "⚠️ Please enter 11 digits", emailErr: "⚠️ Enter a valid email with @",
        fridayErr: "⚠️ Sorry, Friday is a holiday",
        processing: "Confirming booking data.. please wait",
        dupTitle: "Existing Reservation", dupMsg: "Please note that our records show a previous booking registered with this number.",
        adminBadge: "Admin Alert",
        successTitle: "Order Confirmed", successHero: "Thank you for your trust, here are your receipt details:",
        receiptId: "Receipt ID:", bookingDate: "Booking Date:", regTime: "Registration Time:", status: "Status:", approved: "Approved",
        emailNotice: "Please check your email to view the booking details.",
        home: "Back to Home", nameBuy: "Full Name", phoneBuy: "Phone (11 digits)", send: "Send Request",
        buySuccessTitle: "Congrats! Subscribed",
        buySuccessMsg: "Thank you for choosing Future System. Our customer service will contact you soon to activate the full version.",
        buyDupMsg: "Sorry, this number is already registered. Please contact support.",
        contactSupport: "Contact Support"
    }
};

function toggleLanguage() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'EN' : 'AR';
    document.body.classList.toggle('en-mode', currentLang === 'en');
    document.getElementById('txt-b1').innerText = i18n[currentLang].b1;
    document.getElementById('txt-b2').innerText = i18n[currentLang].b2;
    document.getElementById('txt-b3').innerText = i18n[currentLang].b3;
    loadModeSelection();
}

window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        document.getElementById('mainApp').style.opacity = '1';
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
        loadModeSelection();
    }, 2500);
});

new Swiper('.swiper', { loop: true, autoplay: { delay: 4000 }, pagination: { el: '.swiper-pagination', clickable: true } });

function loadModeSelection(){
    contentArea.innerHTML = `
    <div class="card" style="text-align:center;">
        <h3><i class="fa-solid fa-star" style="color:var(--primary-gold)"></i> ${i18n[currentLang].choose}</h3>
        <button class="btn btn-gold" onclick="startDemoSetup()"><i class="fa-solid fa-vial"></i> ${i18n[currentLang].demo}</button>
        <button class="btn" onclick="startBuy()"><i class="fa-solid fa-crown"></i> ${i18n[currentLang].buy}</button>
    </div>`;
}

function startDemoSetup(){
    contentArea.innerHTML = `
    <div class="card">
        <h4><i class="fa-solid fa-gear"></i> ${i18n[currentLang].setup}</h4>
        <div class="booking-form">
            <input id="bizName" type="text" placeholder="${i18n[currentLang].bizName}" value="${CLIENT_NAME}">
            <input id="bizEmail" type="email" placeholder="${i18n[currentLang].bizEmail}" value="${CLIENT_EMAIL}" oninput="validateEmail(this)">
            <div id="emailErr" class="hint-error">${i18n[currentLang].emailErr}</div>
            <button class="btn btn-gold" onclick="saveDemo()">${i18n[currentLang].enter}</button>
            <button class="btn" style="background:#f1f5f9; color:#64748b;" onclick="loadModeSelection()">${i18n[currentLang].back}</button>
        </div>
    </div>`;
}

function validateEmail(el) {
    const err = document.getElementById('emailErr');
    err.style.display = el.value.includes('@') ? 'none' : 'block';
}

function saveDemo(){
    CLIENT_NAME = document.getElementById('bizName').value;
    CLIENT_EMAIL = document.getElementById('bizEmail').value;
    if(!CLIENT_NAME || !CLIENT_EMAIL || !CLIENT_EMAIL.includes('@')) { 
        alert(currentLang === 'ar' ? "يرجى إكمال البيانات بدقة" : "Please fill details accurately"); 
        return; 
    }
    startBooking();
}

function startBooking(){
    let today = new Date().toISOString().split('T')[0];
    contentArea.innerHTML = `
    <div class="card">
        <h4 style="color:var(--primary-gold)"><i class="fa-solid fa-calendar-plus"></i> ${i18n[currentLang].formTitle}</h4>
        <div class="booking-form">
            <input id="pName" type="text" placeholder="${i18n[currentLang].namePl}" oninput="validateName(this)">
            <div id="nameErr" class="hint-error">${i18n[currentLang].nameErr}</div>
            <input id="pPhone" type="tel" maxlength="11" placeholder="${i18n[currentLang].phonePl}" oninput="validatePhone(this)">
            <div id="phoneErr" class="hint-error">${i18n[currentLang].phoneErr}</div>
            <input type="date" id="pDate" min="${today}" onchange="validateDate(this)">
            <div id="dateErr" class="hint-error">${i18n[currentLang].fridayErr}</div>
            <button class="btn btn-gold" onclick="submitBooking()">${i18n[currentLang].confirm}</button>
            <button class="btn" style="background:#e2e8f0; color:#64748b;" onclick="startDemoSetup()">${i18n[currentLang].back}</button>
        </div>
    </div>`;
}

function validateName(el) {
    const err = (el.id === 'pName') ? document.getElementById('nameErr') : document.getElementById('buyNameErr');
    const words = el.value.trim().split(/\s+/);
    err.style.display = (words.length >= 3) ? 'none' : 'block';
}

function validatePhone(el) {
    const err = (el.id === 'pPhone') ? document.getElementById('phoneErr') : document.getElementById('buyPhoneErr');
    el.value = el.value.replace(/[^0-9]/g, ''); 
    err.style.display = (el.value.length === 11) ? 'none' : 'block';
}

function validateDate(el) {
    const err = document.getElementById('dateErr');
    const day = new Date(el.value).getDay();
    if(day === 5) { err.style.display = 'block'; el.value = ''; } 
    else { err.style.display = 'none'; }
}

async function submitBooking(){
    let name = document.getElementById('pName').value.trim();
    let phone = document.getElementById('pPhone').value;
    let date = document.getElementById('pDate').value;
    if(name.split(/\s+/).length < 3 || phone.length < 11 || !date) { return; }

    contentArea.innerHTML = `<div class="card" style="text-align:center;"><i class="fa-solid fa-spinner fa-spin" style="font-size:1.5rem; color:var(--primary-gold)"></i><p>${i18n[currentLang].processing}</p></div>`;

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ name, phone, bookingDate: date, source: CLIENT_NAME, clientEmail: CLIENT_EMAIL, mode: "demo" })
        });
        const data = await response.json();
        if(data.status == "duplicated") {
            contentArea.innerHTML = `
            <div class="card" style="border-top: 4px solid var(--primary-gold);">
                <div class="status-badge">${i18n[currentLang].adminBadge}</div>
                <h3>${i18n[currentLang].dupTitle}</h3>
                <p style="font-size:0.8rem; line-height:1.6;">${data.message}</p>
                <button class="btn btn-gold" onclick="startBooking()">${i18n[currentLang].back}</button>
            </div>`;
        } else {
            let now = new Date();
            let timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            contentArea.innerHTML = `
            <div class="card" style="text-align:center; border-top: 4px solid #22c55e;">
                <i class="fa-solid fa-circle-check" style="font-size:2.2rem; color:#22c55e; margin-bottom:10px;"></i>
                <h3>${i18n[currentLang].successTitle}</h3>
                <div class="details-box">
                    <div class="detail-item"><span class="detail-label">${i18n[currentLang].receiptId}</span><span class="detail-value">#${data.id}</span></div>
                    <div class="detail-item"><span class="detail-label">${i18n[currentLang].bookingDate}</span><span class="detail-value">${date}</span></div>
                    <div class="detail-item"><span class="detail-label">${i18n[currentLang].regTime}</span><span class="detail-value">${timeStr}</span></div>
                </div>
                <button class="btn btn-gold" onclick="loadModeSelection()">${i18n[currentLang].home}</button>
            </div>`;
        }
    } catch (e) { startBooking(); }
}

function startBuy(){
    contentArea.innerHTML = `
    <div class="card">
        <h3><i class="fa-solid fa-basket-shopping"></i> ${i18n[currentLang].buy}</h3>
        <div class="booking-form">
            <input id="buyName" placeholder="${i18n[currentLang].nameBuy}" oninput="validateName(this)">
            <div id="buyNameErr" class="hint-error">${i18n[currentLang].nameErr}</div>
            <input id="buyPhone" placeholder="${i18n[currentLang].phoneBuy}" maxlength="11" oninput="validatePhone(this)">
            <div id="buyPhoneErr" class="hint-error">${i18n[currentLang].phoneErr}</div>
            <button class="btn btn-gold" onclick="submitBuy()">${i18n[currentLang].send}</button>
            <button class="btn" style="background:#f1f5f9; color:#64748b;" onclick="loadModeSelection()">${i18n[currentLang].back}</button>
        </div>
    </div>`;
}

async function submitBuy(){
    let name = document.getElementById('buyName').value.trim();
    let phone = document.getElementById('buyPhone').value;
    if(name.split(/\s+/).length < 3 || phone.length < 11) { return; }

    contentArea.innerHTML = `<div class="card" style="text-align:center;"><i class="fa-solid fa-spinner fa-spin" style="font-size:1.5rem; color:var(--primary-gold)"></i><p>${i18n[currentLang].processing}</p></div>`;

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ mode: "buy", name, phone })
        });
        const data = await response.json();

        if(data.status === "success_buy") {
            // رسالة النجاح الذهبية الفخمة
            contentArea.innerHTML = `
            <div class="card" style="text-align:center; border: 2px solid var(--primary-gold); background: linear-gradient(145deg, #ffffff, #fffcf5);">
                <i class="fa-solid fa-crown" style="font-size:2.5rem; color:var(--primary-gold); margin-bottom:15px; filter: drop-shadow(0 2px 5px rgba(197,160,89,0.4));"></i>
                <h3 style="color:var(--primary-gold); font-weight:800; font-size:1.2rem;">${i18n[currentLang].buySuccessTitle}</h3>
                <p style="font-size:0.85rem; color:var(--dark-deep); line-height:1.7; padding:0 10px;">${i18n[currentLang].buySuccessMsg}</p>
                <div style="height:1px; background:var(--gradient-gold); margin:15px 0; opacity:0.3;"></div>
                <button class="btn btn-gold" onclick="loadModeSelection()">${i18n[currentLang].home}</button>
            </div>`;
        } else if(data.status === "duplicated_buy") {
            // رسالة التكرار مع زر الواتساب
            contentArea.innerHTML = `
            <div class="card" style="text-align:center; border-top: 4px solid var(--error-red);">
                <i class="fa-solid fa-circle-exclamation" style="font-size:2.2rem; color:var(--error-red); margin-bottom:10px;"></i>
                <h3 style="color:var(--dark-deep);">${i18n[currentLang].adminBadge}</h3>
                <p style="font-size:0.85rem; color:#64748b; line-height:1.6;">${i18n[currentLang].buyDupMsg}</p>
                <a href="https://wa.me/201122750229" class="btn btn-whatsapp"><i class="fa-brands fa-whatsapp"></i> ${i18n[currentLang].contactSupport}</a>
                <button class="btn" style="background:#f1f5f9; color:#64748b;" onclick="loadModeSelection()">${i18n[currentLang].back}</button>
            </div>`;
        }
    } catch (e) {
        // في حالة فشل الاتصال نعرض زر الواتساب كحل بديل
        contentArea.innerHTML = `
        <div class="card" style="text-align:center;">
            <i class="fa-solid fa-wifi-slash" style="font-size:2rem; color:#64748b;"></i>
            <p>${currentLang === 'ar' ? 'حدث خطأ في الاتصال' : 'Connection Error'}</p>
