<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Future Reservation System - Premium UI</title>

    <!-- الخطوط والمكتبات الخارجية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>

        /* --- 1. المتغيرات والأساسيات الفخمة --- */
        :root {
            --primary-gold: #c5a059; /* لون ذهبي بريميوم */
            --dark-deep: #0f172a;    /* كحلي غامق فخم */
            --glass-bg: rgba(255, 255, 255, 0.9);
            --luxury-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --gradient-gold: linear-gradient(135deg, #c5a059 0%, #ecd08d 100%);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --error-red: #ef4444;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
        }

        body {
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            height: 100dvh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #f8fafc;
            overflow: hidden; 
            direction: rtl;
        }

        /* --- 2. شاشة الترحيب (Splash Screen) --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-deep);
            z-index: 9999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            transition: opacity 1s ease-in-out;
            color: white;
        }
            width: 120px; height: 120px;
            background: var(--gradient-gold);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            display: flex; align-items: center; justify-content: center;
            animation: morphing 5s infinite ease-in-out;
            margin-bottom: 20px;
        }
        @keyframes morphing {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 50% 50% 20% 80% / 25% 80% 20% 75%; }
        }

        /* --- 3. حاوية التطبيق الرئيسية --- */
        .app {
            width: 100%; max-width: 450px; height: 100%; 
            display: flex; flex-direction: column;
            background: #ffffff;
            position: relative; overflow: hidden;
            opacity: 0; transition: opacity 1s ease;
        }

        /* البانر العلوي */
        .header-slider { width: 100%; height: 280px; position: relative; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        
        .banner-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; width: 80%; z-index: 10;
        }
        .banner-text h1 { font-size: 1.5rem; font-weight: 800; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* المحتوى الداخلي */
        .main-content { 
            flex: 1; overflow-y: auto; padding: 25px; 
            display: flex; flex-direction: column; gap: 20px;
            background: linear-gradient(to bottom, #ffffff, #f1f5f9);
        }

        /* الكروت والأزرار الفخمة */
        .card {
            background: white; border-radius: 24px; padding: 20px;
            box-shadow: var(--luxury-shadow); border: 1px solid rgba(0,0,0,0.03);
            transform: translateY(0); transition: var(--transition-smooth);
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            font-family: 'Cairo'; font-weight: 700; font-size: 1rem;
            cursor: pointer; position: relative; overflow: hidden;
            transition: var(--transition-smooth);
            background: var(--dark-deep); color: white;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
            margin: 10px 0;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(15, 23, 42, 0.3);
            background: #1e293b;
        }

        .btn:active { transform: scale(0.95); }

        .btn-gold {
            background: var(--gradient-gold);
            color: var(--dark-deep);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }

        /* الفورم المدخلات */
        .booking-form input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1.5px solid #e2e8f0; margin-bottom: 5px;
            font-family: 'Cairo'; font-size: 0.9rem; transition: var(--transition-smooth);
        }
        .booking-form input:focus { border-color: var(--primary-gold); box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1); }
        
        .hint-error { color: var(--error-red); font-size: 0.75rem; font-weight: 700; display: none; margin-bottom: 10px; }

        .msg {
            background: white; border-radius: 20px; padding: 30px;
            text-align: center; border-right: 5px solid var(--primary-gold);
            box-shadow: var(--luxury-shadow); line-height: 1.8;
        }

        /* شريط التواصل السفلي */
        .social-nav {
            display: flex; justify-content: center; gap: 25px; padding: 20px;
            background: white; border-top: 1px solid #f1f5f9;
        }
        .social-item img { width: 28px; transition: 0.3s; filter: grayscale(1); opacity: 0.6; }
        .social-item:hover img { filter: grayscale(0); opacity: 1; transform: scale(1.2); }

/* 👇 أضف ده داخل style في الآخر */

/* ===== LOGO ANIMATION ===== */
.logo-img {
    width: 140px;
    margin-bottom: 20px;
    opacity: 0;
    transform: scale(0.7);
    animation: logoFade 1.5s ease forwards;
}

.logo-text {
    opacity: 0;
    transform: translateY(20px);
    animation: textFade 1.5s ease forwards;
    animation-delay: 0.5s;
}

@keyframes logoFade {
    0% { opacity: 0; transform: scale(0.7); }
    60% { opacity: 1; transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}

@keyframes textFade {
    to { opacity: 1; transform: translateY(0); }
}

        .logo-img {
    animation: logoFade 1.5s ease forwards, floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

    </style>
</head>

<body>

<!-- شاشة الترحيب واللوجو -->
<div id="splash">
    <img src="https://ibb.co/VY3zKWnP" class="logo-img">
    <h2 class="logo-text">Future Reservation System</h2>
</div>
<div class="app" id="mainApp">
    <!-- السلايدر العلوي -->
    <div class="header-slider swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=600" alt="Slide 1">
                <div class="banner-text"><h1>أهلاً بك في نظامك الذكي</h1></div>
            </div>
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1497366811353-6870744d04b2?q=80&w=600" alt="Slide 2">
                <div class="banner-text"><h1>إدارة الحجوزات بكل سهولة</h1></div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <!-- المحتوى المتغير -->
    <div id="contentArea" class="main-content"></div>

    <!-- التواصل -->
    <div class="social-nav" style="justify-content: center;">
        <a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
        <a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
        <a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKvGZcmSHyOaKOt_YG2IcILKzGBNczUY4n3OdcruT5sY1Bu-yYVsIbkzL-RjBdSSx3/exec";
const contentArea = document.getElementById('contentArea');

let MODE = "demo";
let CLIENT_NAME = "";
let CLIENT_EMAIL = "";

// إخفاء الـ Splash وفتح التطبيق
window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        document.getElementById('mainApp').style.opacity = '1';
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
        loadModeSelection();
    }, 2500);
});

// تهيئة السلايدر
new Swiper('.swiper', { 
    loop: true, 
    autoplay: { delay: 4000 }, 
    pagination: { el: '.swiper-pagination', clickable: true } 
});

// الصفحة الرئيسية (الاختيارات)
function loadModeSelection(){
    contentArea.innerHTML = `
    <div class="card" style="text-align:center;">
        <h3 style="margin-bottom:20px; color:var(--dark-deep)">اختر نوع التجربة</h3>
        <button class="btn btn-gold" onclick="startDemoSetup()">ابدأ النسخة التجريبية</button>
        <button class="btn" onclick="startBuy()">طلب شراء النسخة الكاملة</button>
    </div>`;
}

// إعدادات التجربة
function startDemoSetup(){
    contentArea.innerHTML = `
    <div class="card">
        <h4 style="margin-bottom:15px;">إعدادات التجربة</h4>
        <div class="booking-form">
            <input id="bizName" type="text" placeholder="اسم النشاط التجاري" value="${CLIENT_NAME}">
            <input id="bizEmail" type="email" placeholder="بريدك الإلكتروني المستلم" value="${CLIENT_EMAIL}" oninput="validateEmail(this)">
            <div id="emailErr" class="hint-error">⚠️ يرجى إدخال إيميل صحيح يحتوي على @</div>
            <button class="btn btn-gold" onclick="saveDemo()">دخول النظام</button>
            <button class="btn" style="background:#f1f5f9; color:#64748b; box-shadow:none;" onclick="loadModeSelection()">رجوع</button>
        </div>
    </div>`;
}

function validateEmail(el) {
    const err = document.getElementById('emailErr');
    err.style.display = el.value.includes('@') ? 'none' : 'block';
}

function saveDemo(){
    CLIENT_NAME = document.getElementById('bizName').value;
    CLIENT_EMAIL = document.getElementById('bizEmail').value;

    if(!CLIENT_NAME || !CLIENT_EMAIL || !CLIENT_EMAIL.includes('@')) {
        alert("يرجى تعبئة اسم النشاط والبريد الإلكتروني بشكل صحيح");
        return;
    }
    MODE = "demo";
    startBooking();
}

// صفحة الحجز
function startBooking(){
    let today = new Date().toISOString().split('T')[0];
    contentArea.innerHTML = `
    <div class="card">
        <h4 style="margin-bottom:15px; color:var(--primary-gold)">نموذج الحجز الذكي</h4>
        <div class="booking-form">
            <input id="pName" type="text" placeholder="الاسم ثلاثي" oninput="validateName(this)">
            <div id="nameErr" class="hint-error">⚠️ يجب كتابة الاسم ثلاثي على الأقل</div>

            <input id="pPhone" type="tel" maxlength="11" placeholder="رقم الهاتف (اكتب الرقم ويفضل واتس)" oninput="validatePhone(this)">
            <div id="phoneErr" class="hint-error">⚠️ من فضلك أدخل 11 رقم (باللغة الإنجليزية فقط)</div>

            <input type="date" id="pDate" min="${today}" onchange="validateDate(this)">
            <div id="dateErr" class="hint-error">⚠️ عذراً، الجمعة إجازة رسمية، يرجى اختيار يوم آخر</div>

            <button class="btn btn-gold" onclick="submitBooking()">تأكيد الحجز الآن</button>
            <button class="btn btn-back" style="background:#e2e8f0; color:#64748b;" onclick="startDemoSetup()">تعديل بيانات النشاط</button>
        </div>
    </div>`;
}

function validateName(el) {
    const err = document.getElementById('nameErr');
    const words = el.value.trim().split(/\s+/);
    err.style.display = words.length >= 3 ? 'none' : 'block';
}

function validatePhone(el) {
    const err = document.getElementById('phoneErr');
    el.value = el.value.replace(/[^0-9]/g, ''); // إجبار الأرقام الإنجليزية فقط
    err.style.display = el.value.length === 11 ? 'none' : 'block';
}

function validateDate(el) {
    const err = document.getElementById('dateErr');
    const day = new Date(el.value).getDay();
    if(day === 5) { // 5 هو يوم الجمعة في JS
        err.style.display = 'block';
        el.value = '';
    } else {
        err.style.display = 'none';
    }
}

function submitBooking(){
    let name = document.getElementById('pName').value.trim();
    let phone = document.getElementById('pPhone').value;
    let date = document.getElementById('pDate').value;

    if(name.split(/\s+/).length < 3 || phone.length != 11 || !date) {
        alert("يرجى تصحيح الأخطاء وإكمال البيانات المطلوبة");
        return;
    }

    contentArea.innerHTML = `<div class="msg">جاري معالجة طلبك الفاخر...</div>`;

    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            name, phone, bookingDate: date,
            source: CLIENT_NAME, clientEmail: CLIENT_EMAIL,
            mode: "demo"
        })
    })
    .then(r => r.json())
    .then(data => {
        if(data.status == "duplicated") {
            contentArea.innerHTML = `
            <div class="msg" style="border-right-color:#ef4444; text-align:right;">
                <h3 style="color:#ef4444; text-align:center;">⚠️ تنبيه بوجود حجز!</h3>
                <div style="font-weight:700; line-height:1.8; color:var(--dark-deep);">
                    ${data.message}
                </div>
                <button class="btn" style="margin-top:20px" onclick="startBooking()">فهمت، العودة</button>
            </div>`;
        } else {
            contentArea.innerHTML = `
            <div class="msg">
                <h3 style="color:var(--primary-gold)">تم الحجز بنجاح!</h3>
                شكراً لثقتك بـ ${CLIENT_NAME}<br>
                📌 رقم الإيصال: <b style="font-size:22px; color:var(--dark-deep);">${data.id}</b><br>
                📅 اليوم: <b>${date}</b><br><br>
                تم إرسال إيصال الحجز الفخم إلى بريدك:<br>
                <span style="color:var(--primary-gold)">${CLIENT_EMAIL}</span>
                <button class="btn" style="margin-top:20px" onclick="loadModeSelection()">العودة للرئيسية</button>
            </div>`;
        }
    })
    .catch(err => {
        alert("حدث خطأ في الاتصال، حاول مرة أخرى");
        startBooking();
    });
}

function startBuy(){
    contentArea.innerHTML = `
    <div class="card">
        <h3>طلب النسخة الكاملة</h3>
        <p>يرجى ترك بياناتك وسنقوم بالتواصل معك فوراً لتجهيز تطبيقك الخاص.</p>
        <div class="booking-form">
            <input id="buyName" placeholder="الاسم">
            <input id="buyPhone" placeholder="رقم الهاتف" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            <button class="btn btn-gold" onclick="submitBuy()">إرسال طلب الشراء</button>
            <button class="btn" style="background:#f1f5f9; color:#64748b;" onclick="loadModeSelection()">رجوع</button>
        </div>
    </div>`;
}

function submitBuy(){
    let name = document.getElementById('buyName').value;
    let phone = document.getElementById('buyPhone').value;
    if(!name || !phone) return;

    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ mode: "buy", name, phone })
    });
    alert("تم إرسال طلبك بنجاح، سنتواصل معك قريباً.");
    loadModeSelection();
}
</script>

</body>
</html>
