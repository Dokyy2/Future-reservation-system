<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Future Reservation System - Demo</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { 
            --primary-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --gold-gradient: linear-gradient(135deg, #b45309 0%, #fbbf24 100%);
            --dark-bg: #0f172a;
            --silk-bg: #ffffff;
            --text-main: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            height: 100dvh; display: flex; justify-content: center; align-items: center;
            background: #f1f5f9; overflow: hidden; direction: rtl;
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        #splash img { width: 220px; height: 220px; border-radius: 50%; border: 4px solid #3b82f6; animation: pulseGlow 2s infinite ease-in-out; }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); } 50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); } }

        .app {
            width: 100%; max-width: 450px; height: 100%; 
            display: flex; flex-direction: column;
            background: var(--silk-bg); position: relative; overflow: hidden;
            opacity: 0; transition: opacity 0.8s ease;
        }

        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Logo Styling */
        .home-logo-container { text-align: center; padding: 20px 0; }
        .home-logo { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 3px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        /* Modern Buttons */
        .hero-btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 800;
            color: white; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 15px; text-decoration: none;
        }
        .btn-demo { background: var(--primary-gradient); }
        .btn-buy { background: var(--gold-gradient); animation: tilt 3s infinite; }
        @keyframes tilt { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(1deg); } 75% { transform: rotate(-1deg); } }

        .hero-btn:active { transform: scale(0.98); }

        .card { padding: 20px; border-radius: 25px; background: #f8fafc; border: 1px solid #e2e8f0; text-align: center; }
        .card-title { font-weight: 800; color: var(--dark-bg); margin-bottom: 10px; font-size: 1.2rem; }
        .card-desc { color: #64748b; font-size: 0.9rem; line-height: 1.6; margin-bottom: 15px; }

        .back-btn {
            position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; 
            background: white; border-radius: 12px; display: none; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 100; cursor: pointer;
        }

        .booking-form { background: white; padding: 20px; border-radius: 25px; border: 2px solid #3b82f6; }
        .booking-form input, .booking-form select, .booking-form textarea {
            width: 100%; margin: 10px 0; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: 'Cairo'; text-align: center;
        }

        .msg { padding: 20px; border-radius: 20px; background: #f0f9ff; border-right: 5px solid #3b82f6; margin-bottom: 15px; line-height: 1.8; }
        
        .footer-info { text-align: center; padding: 15px; font-size: 0.8rem; color: #94a3b8; border-top: 1px solid #f1f5f9; }

        /* Typing Animation */
        .typing { display: flex; gap: 5px; justify-content: center; padding: 10px; }
        .dot { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://i.ibb.co/Xrbv66Yk/Smart-Booking.png" alt="Logo">
    <h1 style="color: white; margin-top: 20px; font-size: 1.5rem;">Future Reservation</h1>
</div>

<div class="app" id="mainApp">
    <div id="backBtn" class="back-btn" onclick="loadHomePage()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1e3a8a" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </div>

    <div id="contentArea" class="main-content"></div>

    <div class="footer-info">
        تواصل معنا: 01122750229 | futurersbooker@gmail.com
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwigRosudTwrXkCfCsn7PJeFFbf-cZj-sk338oUZT-6uDvSyZTm0iLH49NwWgvvrED8/exec";

window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        document.getElementById('mainApp').style.opacity = '1';
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
        loadHomePage();
    }, 2000);
});

function loadHomePage() {
    document.getElementById('backBtn').style.display = 'none';
    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="home-logo-container">
            <img src="https://i.ibb.co/Xrbv66Yk/Smart-Booking.png" class="home-logo">
            <h2 style="color:var(--text-main); margin-top:10px;">مرحباً بك في مستقبل الحجوزات</h2>
        </div>
        
        <div style="padding: 0 10px;">
            <button class="hero-btn btn-demo" onclick="startDemo()">
                <span>🚀</span> جرب المنتج (نسخة العرض)
            </button>
            
            <button class="hero-btn btn-buy" onclick="startPurchase()">
                <span>💎</span> حجز وشراء المنتج الخاص بك
            </button>
        </div>

        <div class="card">
            <div class="card-title">لماذا تختار نظامنا؟</div>
            <div class="card-desc">نظام ذكي متكامل يعمل عبر السحاب، يوفر لك تنظيم المواعيد، منع التكرار، وتنبيهات فورية لضمان أفضل تجربة لعملائك.</div>
        </div>
    `;
}

// --- الجزء الخاص بتجربة المنتج (Demo) ---
function startDemo() {
    document.getElementById('backBtn').style.display = 'flex';
    const content = document.getElementById('contentArea');
    content.innerHTML = '';
    showTyping();
    setTimeout(() => {
        removeTyping();
        addMessage(`
            <b>مرحباً بك في تجربة النظام الذكي 🤖</b><br>
            يمكنك الآن تجربة كيفية قيام العميل بحجز موعد بسهولة تامة.
            <button class="hero-btn btn-demo" style="margin-top:15px;" onclick="renderBookingForm()">ابدأ تجربة الحجز الآن</button>
        `);
    }, 600);
}

function renderBookingForm() {
    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="booking-form">
            <h3 style="text-align:center; color:#1e3a8a;">نموذج حجز تجريبي</h3>
            <input type="text" id="uName" placeholder="الاسم الكامل">
            <input type="tel" id="uPhone" placeholder="رقم الهاتف">
            <input type="date" id="uDate" min="${new Date().toISOString().split('T')[0]}">
            <button class="hero-btn btn-demo" onclick="submitDemo()">تأكيد الحجز التجريبي</button>
        </div>
    `;
}

function submitDemo() {
    const name = document.getElementById('uName').value;
    if(!name) { alert("من فضلك أدخل الاسم"); return; }
    
    showTyping();
    // محاكاة إرسال بيانات
    setTimeout(() => {
        removeTyping();
        document.getElementById('contentArea').innerHTML = `
            <div class="card" style="border-color:#22c55e;">
                <h2 style="color:#22c55e;">✅ تم الحجز بنجاح!</h2>
                <p>هذا ما سيراه عميلك عند استخدامه لنظامك الخاص.</p>
                <button class="hero-btn btn-demo" onclick="loadHomePage()">العودة للرئيسية</button>
            </div>
        `;
    }, 1500);
}

// --- الجزء الخاص بشراء المنتج ---
function startPurchase() {
    document.getElementById('backBtn').style.display = 'flex';
    const content = document.getElementById('contentArea');
    content.innerHTML = `
        <div class="booking-form" style="border-color:#fbbf24;">
            <h3 style="text-align:center; color:#b45309;">طلب شراء وإعداد النظام</h3>
            <p style="font-size:0.8rem; text-align:center;">يرجى ملء البيانات وسيتم التواصل معك لتجهيز نسختك الخاصة.</p>
            
            <input type="text" id="buyName" placeholder="اسمك الكريم">
            <input type="tel" id="buyPhone" placeholder="رقم الواتساب للتواصل">
            <input type="text" id="buyBusiness" placeholder="نوع النشاط (عيادة، مركز، إلخ..)">
            <textarea id="buyNote" placeholder="أي طلبات خاصة؟" rows="3" style="width:100%; border-radius:12px; border:1px solid #e2e8f0; font-family:Cairo; padding:10px;"></textarea>
            
            <button class="hero-btn btn-buy" onclick="submitPurchase()">إرسال طلب الحجز والشراء</button>
        </div>
    `;
}

function submitPurchase() {
    const name = document.getElementById('buyName').value;
    const phone = document.getElementById('buyPhone').value;
    
    if(!name || !phone) { alert("من فضلك أدخل الاسم ورقم الهاتف"); return; }

    showTyping();
    
    // إرسال البيانات الفعلية للسيرفر (السكربت)
    const payload = {
        name: name,
        phone: phone,
        type: "طلب شراء منتج",
        source: document.getElementById('buyBusiness').value,
        notes: document.getElementById('buyNote').value
    };

    fetch(SCRIPT_URL, { method: "POST", mode: "cors", body: JSON.stringify(payload) })
    .then(() => {
        removeTyping();
        document.getElementById('contentArea').innerHTML = `
            <div class="card">
                <h2 style="color:#b45309;">شكراً لثقتك! 🌟</h2>
                <p>تم استلام طلبك بنجاح. سيتواصل معك فريق الدعم الفني عبر الواتساب في أقرب وقت ممكن لتجهيز نظامك.</p>
                <button class="hero-btn btn-demo" onclick="loadHomePage()">العودة للرئيسية</button>
            </div>
        `;
    });
}

// دالات مساعدة
function addMessage(t) { 
    const d = document.createElement("div"); d.className = "msg"; d.innerHTML = t; 
    document.getElementById("contentArea").appendChild(d); 
}
function showTyping() { 
    const d = document.createElement("div"); d.id = "typing"; d.className = "typing"; 
    d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>'; 
    document.getElementById("contentArea").appendChild(d); 
}
function removeTyping() { const t = document.getElementById("typing"); if(t) t.remove(); }
</script>
</body>
</html>
