<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Reservation System</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== الأساس ===== */
body {
    margin:0;
    font-family:'Cairo',sans-serif;
    direction:rtl;
    background:#f8fafc;
}

/* ===== Splash ===== */
#splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:#000 url("https://i.ibb.co/BKjQvtLg/Backgruond.png") center/cover no-repeat;
    z-index:9999;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:1s;
}

#splash.hide{
    opacity:0;
    transform:scale(.95);
}

/* توقيع ذهبى */
.signature{
    margin-top:20px;
    font-size:.8rem;
    font-weight:700;
    background: linear-gradient(135deg,#c5a059,#ecd08d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== App ===== */
.app{
    max-width:450px;
    margin:auto;
    display:flex;
    flex-direction:column;
    opacity:0;
    transition:1s;
}

/* ===== محتوى ===== */
.main-content{
    padding:20px;
}

/* ===== زر ===== */
.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#0f172a;
    color:white;
    font-weight:bold;
}

/* ===== فورم ===== */
.booking-form input{
    width:100%;
    padding:12px;
    margin:8px 0;
}

/* ===== سوشيال ===== */
.social-nav{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.social-item img{
    width:30px;
}

.wa-special img{
    width:45px;
}

/* ===== Footer Signature ===== */
.footer-signature{
    text-align:center;
    font-size:.7rem;
    margin-bottom:10px;
    background: linear-gradient(135deg,#c5a059,#ecd08d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<!-- Splash -->
<div id="splash">
    <div class="signature">Future Reservation System © 2026</div>
</div>

<!-- App -->
<div class="app" id="mainApp">

<div id="contentArea" class="main-content"></div>

<!-- Social -->
<div class="social-nav">
<a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
<a href="#" class="social-item wa-special"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
</div>

<div class="footer-signature">
Future Reservation System © 2026
</div>

</div>

<script>

/* تشغيل التطبيق */
window.onload = ()=>{
setTimeout(()=>{
document.getElementById('splash').classList.add('hide');
document.getElementById('mainApp').style.opacity=1;

setTimeout(()=>{
document.getElementById('splash').style.display='none';
},1200);

loadHome();

},2500);
};

/* الصفحة الرئيسية */
function loadHome(){
document.getElementById('contentArea').innerHTML=`
<h2>أهلاً بك</h2>
<button class="btn" onclick="startBooking()">ابدأ الحجز</button>
<div class="footer-signature">Future Reservation System © 2026</div>
`;
}

/* الفورم */
function startBooking(){
document.getElementById('contentArea').innerHTML=`
<div class="booking-form">
<input placeholder="الاسم">
<input placeholder="رقم الهاتف">

<button class="btn">تأكيد</button>

<div class="signature">Future Reservation System © 2026</div>
</div>
`;
}

</script>

</body>
</html>
