<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Future Reservation System - Premium UI</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<style>

/* ===== الأساسيات ===== */
:root {
    --primary-gold: #c5a059;
    --dark-deep: #0f172a;
    --glass-bg: rgba(255, 255, 255, 0.9);
    --luxury-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    --gradient-gold: linear-gradient(135deg, #c5a059 0%, #ecd08d 100%);
    --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    --error-red: #ef4444;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    outline: none;
}

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f8fafc;
    overflow: hidden;
    direction: rtl;
}

/* ===== Splash Screen (تم تعديله 🔥) ===== */
#splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

    background: url("https://i.ibb.co/1GbPSfyw/Bannar-2-LOGO.png") center center / cover no-repeat;

    z-index: 9999;
    transition: opacity 1s ease-in-out;
}

/* ===== التطبيق ===== */
.app {
    width: 100%;
    max-width: 450px;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transition: opacity 1s ease;
}

/* ===== السلايدر ===== */
.header-slider { width: 100%; height: 280px; position: relative; }
.swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }

.banner-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    width: 80%;
}

.banner-text h1 {
    font-size: 1.5rem;
    font-weight: 800;
    margin: 0;
}

/* ===== المحتوى ===== */
.main-content {
    flex: 1;
    overflow-y: auto;
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* ===== الكروت ===== */
.card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: var(--luxury-shadow);
}

/* ===== الأزرار ===== */
.btn {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-family: 'Cairo';
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transition-smooth);
    background: var(--dark-deep);
    color: white;
    margin: 10px 0;
}

.btn-gold {
    background: var(--gradient-gold);
    color: var(--dark-deep);
}

/* ===== الفورم ===== */
.booking-form input {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: 1.5px solid #e2e8f0;
    margin-bottom: 5px;
}

.hint-error {
    color: var(--error-red);
    font-size: 0.75rem;
    display: none;
}

/* ===== الرسائل ===== */
.msg {
    background: white;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
}

/* ===== السوشيال ===== */
.social-nav {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 20px;
    background: white;
}

.social-item img {
    width: 28px;
}

</style>
</head>

<body>

<!-- Splash -->
<div id="splash"></div>

<div class="app" id="mainApp">

<div class="header-slider swiper">
<div class="swiper-wrapper">

<div class="swiper-slide">
<img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=600">
<div class="banner-text"><h1>أهلاً بك في نظامك الذكي</h1></div>
</div>

<div class="swiper-slide">
<img src="https://images.unsplash.com/photo-1497366811353-6870744d04b2?q=80&w=600">
<div class="banner-text"><h1>إدارة الحجوزات بكل سهولة</h1></div>
</div>

</div>
<div class="swiper-pagination"></div>
</div>

<div id="contentArea" class="main-content"></div>

<div class="social-nav">
<a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
<a href="#" class="social-item"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKvGZcmSHyOaKOt_YG2IcILKzGBNczUY4n3OdcruT5sY1Bu-yYVsIbkzL-RjBdSSx3/exec";

const contentArea = document.getElementById('contentArea');

let CLIENT_NAME = "";
let CLIENT_EMAIL = "";

/* Splash */
window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        document.getElementById('mainApp').style.opacity = '1';
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
        loadModeSelection();
    }, 2500);
});

/* Slider */
new Swiper('.swiper', {
    loop: true,
    autoplay: { delay: 4000 },
    pagination: { el: '.swiper-pagination', clickable: true }
});

/* Home */
function loadModeSelection(){
contentArea.innerHTML = `
<div class="card" style="text-align:center;">
<h3>اختر نوع التجربة</h3>
<button class="btn btn-gold" onclick="startDemoSetup()">تجربة</button>
<button class="btn" onclick="startBuy()">شراء</button>
</div>`;
}

/* Demo */
function startDemoSetup(){
contentArea.innerHTML = `
<div class="card">
<input id="bizName" placeholder="اسم النشاط">
<input id="bizEmail" placeholder="الإيميل">
<button class="btn btn-gold" onclick="saveDemo()">التالي</button>
</div>`;
}

function saveDemo(){
CLIENT_NAME = bizName.value;
CLIENT_EMAIL = bizEmail.value;

if(!CLIENT_NAME || !CLIENT_EMAIL.includes("@")){
alert("اكتب البيانات صح");
return;
}

startBooking();
}

/* Booking */
function startBooking(){
contentArea.innerHTML = `
<div class="card">
<input id="pName" placeholder="الاسم ثلاثي">
<input id="pPhone" placeholder="الهاتف">
<input type="date" id="pDate">
<button class="btn btn-gold" onclick="submitBooking()">تسجيل</button>
</div>`;
}

function submitBooking(){
let name = pName.value;
let phone = pPhone.value;
let date = pDate.value;

if(!name || !phone || !date){
alert("اكمل البيانات");
return;
}

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
name, phone, bookingDate: date,
source: CLIENT_NAME,
clientEmail: CLIENT_EMAIL
})
})
.then(r=>r.json())
.then(data=>{
contentArea.innerHTML = `
<div class="msg">
تم بنجاح<br>
${CLIENT_NAME}
</div>`;
});
}

/* Buy */
function startBuy(){
contentArea.innerHTML = `
<div class="card">
<input id="buyName" placeholder="الاسم">
<input id="buyPhone" placeholder="الهاتف">
<button class="btn btn-gold" onclick="submitBuy()">ارسال</button>
</div>`;
}

function submitBuy(){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
mode:"buy",
name:buyName.value,
phone:buyPhone.value
})
});
alert("تم");
loadModeSelection();
}

</script>

</body>
</html>
